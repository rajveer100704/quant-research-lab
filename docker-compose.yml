# ============================================================
# Docker Compose — AI Quant Trading Research Platform
# Unified production service for easy deployment.
# ============================================================

version: "3.9"

services:
  quant-platform:
    build: .
    container_name: quant_research_lab
    ports:
      - "8501:8501"
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
      - ./validation_results:/app/validation_results
      - ./research_lab/reports:/app/research_lab/reports
    environment:
      - PLATFORM_LOG_LEVEL=INFO
      - BINANCE_TESTNET=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
